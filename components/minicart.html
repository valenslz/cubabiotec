<div id="minicart-overlay" class="fixed inset-0 z-[60] bg-black/50 opacity-0 pointer-events-none transition-opacity duration-300" aria-hidden="true"></div>

<aside id="minicart-panel" class="fixed inset-y-0 right-0 z-[70] flex w-full max-w-md flex-col bg-white shadow-2xl translate-x-full transition-transform duration-300 ease-out" role="dialog" aria-modal="true" aria-labelledby="minicart-title" aria-hidden="true">
    <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4">
        <h2 id="minicart-title" class="text-xs font-bold uppercase tracking-[0.2em] text-bio-dark">Tu carrito</h2>
        <button type="button" id="minicart-close" class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-200 text-gray-600 transition hover:bg-gray-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-bio-dark/30" aria-label="Cerrar carrito">
            <span class="text-lg leading-none" aria-hidden="true">×</span>
        </button>
    </div>

    <div id="minicart-shipping-wrap" class="border-b border-gray-100 px-5 py-4">
        <p id="minicart-shipping-msg" class="text-[11px] font-semibold uppercase tracking-wide text-bio-dark"></p>
        <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-gray-100">
            <div id="minicart-shipping-bar" class="h-full rounded-full bg-bio-pale transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="minicart-empty" class="hidden flex-1 flex-col items-center justify-center gap-3 px-5 py-12 text-center text-sm text-gray-500">
        <p id="minicart-empty-text">Tu carrito está vacío.</p>
        <a id="minicart-empty-link" href="/productos" class="inline-block font-semibold text-bio-dark underline">Ver productos</a>
    </div>

    <div id="minicart-items-wrap" class="hidden min-h-0 flex-1 overflow-y-auto px-5 py-4">
        <ul id="minicart-items" class="space-y-6"></ul>

        <div class="mt-8 border-t border-gray-100 pt-6">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">También te puede interesar</p>
            <div class="mt-3 rounded-xl border border-dashed border-gray-200 bg-gray-50/80 p-4 text-center text-xs text-gray-600">
                Explora el <a href="/productos" class="font-semibold text-bio-dark underline">catálogo completo</a>.
            </div>
        </div>
    </div>

    <div id="minicart-footer" class="hidden border-t border-gray-100 bg-white px-5 py-4">
        <div class="mb-4 flex items-start justify-between gap-3 text-sm">
            <span id="minicart-footer-label" class="font-medium uppercase tracking-wide text-gray-600">Total estimado</span>
            <span id="minicart-footer-total" class="text-lg font-bold tabular-nums text-bio-dark">—</span>
        </div>
        <a id="minicart-checkout" href="/pages/checkout.html" class="block w-full rounded-lg bg-bio-dark py-3.5 text-center text-sm font-semibold text-white transition hover:bg-bio-dark/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-bio-dark/40 focus-visible:ring-offset-2">
            Continuar al pago
        </a>
    </div>
</aside>
