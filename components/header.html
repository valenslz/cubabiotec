<header id="main-header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-out">
    <!-- Oscurece el contenido al abrir el menú (solo móvil); clic cierra -->
    <div id="mobile-nav-backdrop"
        class="fixed  left-0 right-0 top-16 bottom-0 z-[48] bg-black/45 opacity-0 pointer-events-none transition-opacity duration-200 md:hidden"
        aria-hidden="true"></div>

    <nav class="relative z-[60] flex max-w-7xl mx-auto items-center justify-between px-4 md:px-8 h-16 md:h-20">
        <a href="/" class="relative z-20 flex shrink-0 items-center gap-3">
            <img alt="CuBaBiotec Logo" class="img-fade h-10 md:h-12 w-auto object-contain "
                src="https://static.readdy.ai/image/b7aa2bdd94c25bd1c2e9a3baf058b838/be6c68a2b3c14e90617c527c876213d8.png">
        </a>

        <!-- En móvil: panel fijo bajo la barra con los li; en md+: fila del nav -->
        <ul id="main-nav" aria-label="Principal"
            class="main-nav-panel flex max-h-[calc(100dvh-4rem)] flex-col gap-1 overflow-y-auto md:static md:z-auto md:max-h-none md:w-auto md:flex-row md:items-center md:gap-3 md:overflow-visible md:border-0 md:bg-transparent md:p-0 md:shadow-none md:flex">
            <li><a href="/" data-nav="inicio" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                bg-white/20 text-white">Inicio</a></li>
            <li><a href="/pages/productos.html" data-nav="productos" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                text-white/90 hover:text-white hover:bg-white/10">Productos</a></li>
            <li><a href="/pages/servicios.html" data-nav="servicios" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                text-white/90 hover:text-white hover:bg-white/10">Servicios</a></li>
            <li><a href="/pages/cursos.html" data-nav="cursos" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                text-white/90 hover:text-white hover:bg-white/10">Cursos</a></li>
            <li><a href="/pages/blog.html" data-nav="blog" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                text-white/90 hover:text-white hover:bg-white/10">Blog</a></li>
            <li><a href="/pages/contacto.html" data-nav="contacto" class=" nav-link px-4 py-3 md:py-2 rounded-full text-sm font-medium font-body transition-all duration-200 whitespace-nowrap
                text-white/90 hover:text-white hover:bg-white/10">Contacto</a></li>
        </ul>

        <div class="relative z-20 flex shrink-0 items-center gap-1 sm:gap-2 md:gap-3">
            <a href="/pages/cuenta.html" id="header-account-link" data-nav="cuenta"
                class="header-icon-btn flex h-full w-fit items-center justify-center px-2 sm:px-3 lg:px-3"
                data-test-id="account-slide-over-dialog-trigger" aria-label="Cuenta e inicio de sesión">
                <div aria-hidden="true" class="hover:opacity-70"><svg class="stroke-current" width="17" height="19"
                        viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8.59488" cy="4.34" r="3.59" stroke-width="1.5"></circle>
                        <path
                            d="M16.19 17.3599C16.19 13.1653 12.7896 9.76489 8.595 9.76489C4.4004 9.76489 1 13.1653 1 17.3599"
                            stroke-width="1.5" stroke-linecap="round"></path>
                    </svg></div>
            </a>
            <button type="button" id="minicart-open-btn"
                class="header-icon-btn relative flex h-full w-fit items-center justify-center px-2 sm:px-3 lg:px-3"
                data-test-id="minicart-slide-over-dialog-trigger" aria-label="Abrir carrito" aria-expanded="false"
                aria-controls="minicart-panel">
                <div aria-hidden="true" class="hover:opacity-70 relative flex items-center justify-center w-8 h-8"><svg
                        width="20" height="18" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4.75C12 2.54086 10.2091 0.75 8 0.75C5.79086 0.75 4 2.54086 4 4.75"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                        <mask id="mask0_44_9583" mask-type="alpha" maskUnits="userSpaceOnUse" x="0" y="6" width="17"
                            height="11">
                            <path
                                d="M1.60098 6.72534L3.20098 15.1319H12.801L14.401 6.72534H16.001V16.8132H0.000976562V6.72534H1.60098Z"
                                fill="black"></path>
                        </mask>
                        <g mask="url(#mask0_44_9583)">
                            <path d="M0.945068 7.56598L2.27867 15.9725H13.7235L15.0571 7.56598H0.945068Z"
                                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
                        </g>
                    </svg>
                    <span id="header-cart-count"
                        class="pointer-events-none absolute inset-0 left-1/2 top-0 -translate-x-1/2 text-[11px] font-extrabold leading-none tabular-nums tracking-tight text-current"></span>
                </div>

            </button>
         
            

            <button type="button" id="header-menu-toggle"
                class="header-menu-btn inline-flex items-center justify-center md:hidden rounded-full p-2.5 -mr-1 text-current transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-current/35"
                aria-expanded="false" aria-controls="main-nav" aria-label="Abrir menú">
                <span class="header-menu-icon-open" aria-hidden="true">
                    <svg class="fill-current block" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fill="currentColor"
                            d="M18 15H2V14H18V15ZM18 10H2V9H18V10ZM18 5H2V4H18V5Z" />
                    </svg>
                </span>
                <span class="header-menu-icon-close hidden" aria-hidden="true">
                    <svg class="block" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round">
                        <path d="M6 6l12 12M18 6L6 18" />
                    </svg>
                </span>
            </button>
        </div>
    </nav>
</header>
