<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto — CuBaBiotec</title>
    <meta name="description" content="Ficha de producto CuBaBiotec: equipos y consumibles de biotecnología.">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="theme-color" content="#1b4332">
    <link rel="canonical" href="https://cubabiotec.com/pages/producto.html">
    <meta property="og:locale" content="es_CO">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Producto — CuBaBiotec">
    <meta property="og:description" content="Equipos de biotecnología CuBaBiotec.">
    <meta property="og:url" content="https://cubabiotec.com/pages/producto.html">
    <meta property="og:site_name" content="CuBaBiotec">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Producto — CuBaBiotec">
    <link rel="preconnect" href="https://cms.cubabiotec.com" crossorigin>
    <link href="../dist/output.css" rel="stylesheet">
    <script src="../assets/js/site-seo-config.js"></script>
    <script src="../assets/js/wc-store-config.js"></script>
    <script src="../assets/js/wc-catalog-helpers.js"></script>
    <script src="../assets/js/wc-cart.js"></script>
    <script src="../assets/js/minicart.js"></script>
    <script src="../assets/js/app.js" defer></script>
    <script src="../assets/js/producto.js" defer></script>
</head>

<body data-header-mode="solid" class="bg-white text-gray-900 antialiased">
    <div id="header"></div>

    <main class="min-h-screen pt-16 md:pt-20">
        <div class="mx-auto max-w-7xl px-4 py-10 md:px-8 md:py-14">
            <a id="producto-volver" href="/productos"
                class="mb-8 inline-flex items-center gap-2 text-sm font-medium text-bio-dark/80 transition-colors hover:text-bio-dark">
                <span aria-hidden="true">←</span> <span id="producto-volver-label">Volver al catálogo</span>
            </a>

            <div id="producto-error" class="hidden rounded-2xl border border-red-100 bg-red-50 px-6 py-12 text-center">
                <p class="font-semibold text-red-800" id="producto-error-msg">No se encontró el producto.</p>
                <a id="producto-error-volver" href="/productos" class="mt-4 inline-block text-sm font-medium text-bio-dark underline">Ir al catálogo</a>
            </div>

            <article id="producto-content" class="hidden">
                <div class="grid gap-10 lg:grid-cols-2 lg:gap-14 lg:items-start">
                    <!-- Galería -->
                    <div class="flex flex-col gap-4">
                        <div
                            class="flex min-h-[320px] items-center justify-center rounded-3xl bg-bio-dark p-8 md:min-h-[420px] md:p-12">
                            <img id="producto-img-principal" src="" alt=""
                                class="img-fade max-h-[min(60vh,420px)] w-full max-w-lg object-contain">
                        </div>
                        <div id="producto-thumbs" class="flex flex-wrap justify-center gap-2"></div>
                    </div>

                    <!-- Detalle -->
                    <div class="flex flex-col gap-6">
                        <header>
                            <p id="producto-categoria" class="mb-2 hidden text-[11px] font-semibold uppercase tracking-[0.18em] text-bio-dark"></p>
                            <h1 id="producto-title" class="text-3xl font-bold leading-tight text-bio-dark md:text-4xl"></h1>
                            <p id="producto-price" class="mt-4 text-2xl font-bold tabular-nums text-bio-dark"></p>
                        </header>

                        <div id="producto-description" class="producto-prose text-sm leading-relaxed text-gray-600 md:text-base"></div>

                        <p id="producto-stock" class="text-sm font-semibold text-bio-dark"></p>

                        <div id="producto-qty-block" class="flex flex-col gap-3 sm:flex-row sm:items-end sm:gap-8">
                            <div>
                                <span class="mb-2 block text-sm font-medium text-gray-700">Cantidad:</span>
                                <div class="inline-flex items-stretch overflow-hidden rounded-lg border border-gray-200">
                                    <button type="button" id="producto-qty-menos"
                                        class="flex w-11 items-center justify-center bg-bio-dark text-lg font-medium text-white transition hover:bg-bio-dark/90"
                                        aria-label="Disminuir cantidad">−</button>
                                    <span id="producto-qty-valor"
                                        class="flex min-w-[3rem] items-center justify-center bg-white px-3 text-base font-semibold tabular-nums text-bio-dark">1</span>
                                    <button type="button" id="producto-qty-mas"
                                        class="flex w-11 items-center justify-center bg-bio-dark text-lg font-medium text-white transition hover:bg-bio-dark/90"
                                        aria-label="Aumentar cantidad">+</button>
                                </div>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="button" id="producto-add-cart"
                                class="w-full rounded-lg bg-bio-dark px-8 py-3.5 text-center text-base font-semibold text-white shadow-sm transition hover:bg-bio-dark/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-bio-dark/40 focus-visible:ring-offset-2 sm:w-auto sm:min-w-[240px]">
                                Añadir al carrito
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <div id="footer"></div>

    <div id="producto-aviso-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/50 p-4" role="dialog" aria-modal="true" aria-labelledby="producto-aviso-title">
        <div class="w-full max-w-md border border-gray-900 bg-white p-6 shadow-xl md:p-8">
            <h2 id="producto-aviso-title" class="text-sm font-bold uppercase tracking-[0.15em] text-gray-900">Aviso</h2>
            <p id="producto-aviso-text" class="mt-4 text-left text-sm leading-relaxed text-gray-800"></p>
            <button type="button" id="producto-aviso-cerrar" class="mt-8 w-full border border-gray-900 bg-white py-3 text-center text-sm font-semibold uppercase tracking-wide text-gray-900 transition hover:bg-gray-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-900/30">Cerrar</button>
        </div>
    </div>
</body>

</html>
